# A股日线高抛低吸交易信号系统配置

data:
  source: akshare
  db_path: data/stock_data.db
  cache_dir: data/cache
  default_start_date: "2020-01-01"
  fetch_timeout: 30
  max_retries: 3
  retry_delay: 1.0

fusion:
  weights:
    tech_indicator: 0.25
    mean_reversion: 0.25
    volume_price: 0.25
    trend_following: 0.25
  buy_threshold: 0.6
  sell_threshold: -0.6

ui:
  theme: dark
  window_width: 1400
  window_height: 900
  sidebar_width: 200
  log_panel_height: 150
  kline_visible_range: 120

strategies:
  tech_indicator:
    enabled: true
    params:
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      kdj_n: 9
      kdj_m1: 3
      kdj_m2: 3
      rsi_periods: [6, 12, 24]
      rsi_buy_threshold: 30
      rsi_sell_threshold: 70
      boll_period: 20
      boll_std: 2
  mean_reversion:
    enabled: true
    params:
      ma_period: 20
      deviation_threshold: 2.0
      support_lookback: 20
      resistance_lookback: 20
      reversion_speed: 0.5
  volume_price:
    enabled: true
    params:
      volume_ratio_threshold: 2.0
      volume_ma_period: 5
      price_change_threshold: 0.03
      obv_trend_period: 10
  trend_following:
    enabled: true
    params:
      fast_ma: 5
      slow_ma: 20
      trend_ma: 60
      momentum_period: 10
      atr_period: 14

fusion:
  weights:
    tech_indicator: 0.25
    mean_reversion: 0.25
    volume_price: 0.25
    trend_following: 0.25
  buy_threshold: 0.6
  sell_threshold: -0.6

backtest:
  initial_capital: 100000
  commission_rate: 0.0003
  stamp_tax_rate: 0.001
  min_commission: 5.0
  min_lot_size: 100

optimizer:
  grid_search:
    max_combinations: 500
  genetic:
    population_size: 50
    generations: 30
    crossover_rate: 0.7
    mutation_rate: 0.2
    tournament_size: 3

ui:
  theme: dark
  window_width: 1400
  window_height: 900
  sidebar_width: 200
  log_panel_height: 150